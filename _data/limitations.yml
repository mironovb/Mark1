- heading: "One-sided track tensioner"
  body: "The two track loops were printed across two different machines (Dreamer and Ender). Dimensional drift between them left one loop slightly looser, so a printed tensioner was added on that side. The tensioner is a fix, not a feature — the next build prints all links on one machine."

- heading: "Single-motor differential"
  body: "Both tracks share one input. There is no active steering. The differential responds to load — if the inside track meets more resistance during a turn, the outside speeds up — but the controller cannot command a turn. Today the vehicle drives forward, slow, and steers passively."

- heading: "PLA fatigue at the link pin holes"
  body: "148 link holes flex with every revolution. PLA is not fatigue-friendly; the holes elongate over time and the rivets begin to seat sloppily. The vehicle is fine for a demo run; it would not survive a long-duration test without TPU links."

- heading: "Welded rivet heads"
  body: "Soldering-iron welds hold well at rest but can shear under repeated bending. The rivets stay put while the vehicle rolls slowly on a flat floor. Faster running, or running over uneven ground, would start popping rivets."
