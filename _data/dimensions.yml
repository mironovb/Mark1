critical_fits:
  - heading: "Wheel and shaft bores"
    body: "The wheels need to slide onto the Ø0.30 in shafts but not wobble. PLA shrinks circular features, so all four wheel bores came out 6.00 % under and had to be reamed by hand to seat the shafts."
  - heading: "Side-panel thickness"
    body: "0.110 in design printed at 0.118 in — a 7.27 % over-extrusion that tightened the channels where the side panels meet the cabin. The fit-up was still possible without sanding, but the sheet thickness is the loosest tolerance in the build."
  - heading: "Bevel-gear bores"
    body: "The bores in both bevel gears came out Ø0.288 in against Ø0.300 in design. Same ream-by-hand step as the wheels, but the gear bores matter more — any wobble here shows up as backlash through the differential."
  - heading: "Outer dimensions"
    body: "All length and height values landed within 1 % (panels 0.39 % to 0.56 %, cabin 0.53 % to 0.55 %, wheel diameter 0.64 %). The hull goes together without trimming or shimming because the major outer dimensions track the CAD."

method:
  text: "Each printed feature was measured with calipers, n = 3, mean reported. Δ is printed minus design. Negative Δ means the printed feature is smaller than the CAD value — the typical PLA shrinkage direction."
