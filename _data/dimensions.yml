critical_fits:
  - heading: "Wheel and shaft bores"
    body: "The wheels need to slide onto the 0.30 in shafts without wobble. PLA shrinks round features. All four wheel bores came out 6.00 percent under and had to be reamed by hand to seat the shafts."
  - heading: "Side panel thickness"
    body: "0.110 in design printed at 0.118 in. That is 7.27 percent thicker than planned. It tightened the channels where the side panels meet the cabin. The fit-up still worked without sanding, but the sheet thickness has the loosest tolerance in the build."
  - heading: "Bevel gear bores"
    body: "Both bevel gear bores came out at 0.288 in versus a 0.300 in design. Same hand ream as the wheels. The gear bores matter more, because any wobble here shows up as backlash through the differential."
  - heading: "Outer dimensions"
    body: "All length and height values landed inside 1 percent. Panels were 0.39 to 0.56 percent off. Cabin was 0.53 to 0.55 percent off. Wheel diameter was 0.64 percent off. The hull goes together without trimming or shimming because the major outer numbers track the CAD."

method:
  text: "Each printed feature was measured with calipers, three times each, and the mean was used. Delta is printed minus design. A negative value means the printed feature is smaller than the CAD value, which is the normal direction PLA shrinks."
