zero_waste_reasons:
  - heading: "Print orientation"
    body: "Every part placed flat-side-down or on its widest face. No overhangs steeper than 45°, so no support material was needed."
  - heading: "Single-color PLA"
    body: "One spool, one color, one nozzle. No purge towers and no filament-change waste."
  - heading: "No failed prints"
    body: "Each part came off the bed first try. Tolerances were checked on small witness prints before committing to the larger pieces."
