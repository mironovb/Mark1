zero_waste_reasons:
  - heading: "Print orientation"
    body: "Every part sat flat side down or on its widest face. No overhangs were steeper than 45 degrees, so no support material was needed."
  - heading: "Single color PLA"
    body: "One spool, one color, one nozzle. There were no purge towers and no waste from filament changes."
  - heading: "No failed prints"
    body: "Each part came off the bed on the first try. I checked tolerances on small witness prints before I committed to the larger pieces."
