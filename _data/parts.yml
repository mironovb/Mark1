- id: P-01
  name: "Hull side panels"
  file: "hullside1.ipt"
  qty: 2
  description: "Mirrored rhomboidal side panels. The long ground contact silhouette comes from the 1916 inspiration. They are 14.00 in long, 5.00 in tall, and 0.11 in thick."
  drawing_sheet: 3
  group: "structure"
- id: P-02
  name: "Central cabin"
  file: "centralcabin.ipt"
  qty: 1
  description: "Open electronics tub. It is a U-channel with two 135 degree corner cuts at the front. It carries the Arduino, the driver board, the motor, and the battery pack between the two side panels."
  drawing_sheet: 2
  group: "structure"
- id: P-03
  name: "Drive and idler wheels"
  file: "wheeldrive.ipt"
  qty: 8
  description: "Wheels at 5.00 in diameter. Each wheel has four square cutouts at the rim, spaced 90 degrees apart. The cutouts catch the track link teeth so the wheels drive without slipping."
  drawing_sheet: 5
  group: "drivetrain"
- id: P-04
  name: "Differential gear sub-assembly"
  file: "Gearassembly.iam"
  qty: 1
  description: "Crown and pinion bevel pair set at a 23 to 54 ratio. The crown rides on the carrier. Two side gears feed the left and right outputs through spider gears."
  drawing_sheet: 7
  group: "drivetrain"
- id: P-05
  name: "Track shafts (barrod)"
  file: "barrod.ipt"
  qty: 2
  description: "Shafts at 0.30 in diameter that pass through the hull side panels and the wheel bores. A 1.00 in collar (about 1.17 in across) carries the side gear of the differential. Single-piece print, no glued parts."
  drawing_sheet: 4
  group: "drivetrain"
- id: P-06
  name: "Stepper motor mount"
  file: "bracket.ipt"
  qty: 1
  description: "L-bracket with a 1.80 in bore that locates a NEMA 17 motor. A 1.00 in inner radius keeps the corner from cracking where the bore meets the bracket face."
  drawing_sheet: 6
  group: "drivetrain"
- id: P-07
  name: "Track link"
  file: "(extra)"
  qty: 148
  description: "Pin link track segments. They print in batches. Each link has two pin holes for plain rivets."
  drawing_sheet: null
  group: "tracks"
- id: P-08
  name: "Plain rivet"
  file: "(extra)"
  qty: 150
  description: "PLA pins. They go through the link pin holes and weld with a soldering iron. The iron softens the head until it mushrooms over the link face."
  drawing_sheet: null
  group: "tracks"
- id: P-09
  name: "Nameplate"
  file: "(surface text)"
  qty: 1
  description: "Bogdan nameplate added with the text-on-surface tool in Bambu Studio. It prints at the same time as the side panel."
  drawing_sheet: null
  group: "structure"
- id: P-10
  name: "Top-level assembly"
  file: "BMironov_TrackedMark.iam"
  qty: 1
  description: "The Inventor assembly that ties every part together with constraints. The exploded view and the drawing sheets come from this file."
  drawing_sheet: 1
  group: "structure"
